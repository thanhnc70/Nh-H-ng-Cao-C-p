<!DOCTYPE html>
<html lang="vi">

<head>
    <script src="assets/js/auth.js"></script>

<script>

protectRoute();

</script>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>WS Restaurant Cart</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet"
href="assets/css/style.css">

<link rel="stylesheet"
href="assets/css/responsive.css">

</head>

<body>

<!-- HEADER -->

<header class="header">

<nav class="navbar">

<div class="logo">

<i class="fa-solid fa-utensils"></i>

<span>WS RESTAURANT</span>

</div>

<ul class="nav-links">

<li><a href="index.html">Trang Chủ</a></li>

<li><a href="menu.html">Thực Đơn</a></li>

<li><a href="cart.html">Giỏ Hàng</a></li>

</ul>

<div class="nav-icons">

<div class="cart-icon">

<i class="fa-solid fa-cart-shopping"></i>

<span id="cart-count">

0

</span>

</div>

</div>

<div id="menu-btn">

<i class="fa-solid fa-bars"></i>

</div>

</nav>

</header>

<!-- HERO -->

<section class="menu-hero">

<h1>GIỎ HÀNG CỦA BẠN</h1>

<p>

Kiểm tra đơn hàng trước khi thanh toán.

</p>

</section>

<!-- CART SECTION -->

<section class="cart-section">

<div class="cart-container">

<!-- LEFT -->

<div class="cart-left">

<h2>

Shopping Cart

</h2>

<div id="cart-items">

<!-- JS RENDER -->

</div>

</div>

<!-- RIGHT -->

<div class="cart-right">

<h2>

Order Summary

</h2>

<div class="summary-row">

<span>Subtotal</span>

<span id="subtotal">

$0

</span>

</div>

<div class="summary-row">

<span>VAT (10%)</span>

<span id="vat">

$0

</span>

</div>

<div class="summary-row">

<span>Discount</span>

<span id="discount">

$0

</span>

</div>

<hr>

<div class="summary-row total">

<span>Total</span>

<span id="total">

$0

</span>

</div>

<!-- COUPON -->

<div class="coupon-box">

<input
type="text"
id="coupon"

placeholder="Coupon Code">

<button
onclick="applyCoupon()">

Apply

</button>

</div>

<!-- CHECKOUT -->

<button
class="checkout-btn"

onclick="openCheckout()">
</button>

</div>

</div>

</section>

<!-- EMPTY STATE -->

<section id="empty-cart"

class="empty-state">

<i class="fa-solid fa-cart-shopping"></i>

<h2>

Giỏ hàng trống

</h2>

<p>

Bạn chưa thêm món ăn nào.

</p>

<a href="menu.html">

<button class="gold-btn">

Go To Menu

</button>

</a>

</section>

<!-- TOAST -->

<div id="toast"></div>

<!-- JS -->

<!-- CHECKOUT MODAL -->

<div id="checkout-modal"

class="checkout-modal">

<div class="checkout-content">

<span id="closeModal">

&times;

</span>

<h2>

Checkout Payment

</h2>

<!-- METHOD -->

<div class="payment-methods">

<button class="pay-btn"

onclick="selectPayment('visa')">

Visa

</button>

<button class="pay-btn"

onclick="selectPayment('qr')">

QR Pay

</button>

<button class="pay-btn"

onclick="selectPayment('cash')">

Cash

</button>

</div>

<!-- PAYMENT AREA -->

<div id="payment-area">

<p>

Choose payment method.

</p>

</div>

<button

class="checkout-btn"

onclick="confirmPayment()">

Confirm Payment

</button>

</div>

</div>


<script src="assets/js/cart.js"></script>

</body>

</html>
